<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/oritek-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oritek World Monitor | 欧冶半导体全球产业监测中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module">
      // 确保地图渲染被执行 - 如果 1 秒后地图还没渲染，强制调用
      setTimeout(() => {
        console.log('=== CHECKING MAP RENDER STATUS ===')
        const mapContainer = document.querySelector('.world-map-container')
        if (mapContainer && !document.querySelector('.world-map-svg path')) {
          console.log('=== MAP NOT RENDERED, FORCING RENDER ===')
          // 调用渲染函数
          if (window.renderRealWorldMap) {
            window.renderRealWorldMap()
          } else if (window.dv) {
            window.dv()
          }
        }
      }, 1000)
    </script>
  </body>
</html>
