<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/oritek-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Oritek World Monitor — 欧冶半导体全球产业监测中心，实时追踪半导体、AI、汽车电子、机器人等前沿科技产业的新闻动态、风险预警、产业洞察与政策监管。" />
    <meta name="theme-color" content="#03050a" />
    <meta property="og:title" content="Oritek World Monitor | 欧冶半导体全球产业监测中心" />
    <meta property="og:description" content="实时追踪半导体、AI、汽车电子、机器人等前沿科技产业动态" />
    <meta property="og:type" content="website" />
    <title>Oritek World Monitor | 欧冶半导体全球产业监测中心</title>
    <!-- Google Fonts 已移除，使用系统字体栈以提升国内加载速度 -->
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script type="module">
      // Service Worker 注册（缓存 world-110m.json）
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('[SW] Registered:', reg.scope)
          }).catch(e => {
            console.warn('[SW] Registration failed:', e)
          })
        })
      }
    </script>
    <script type="module">
      // 确保地图渲染被执行 - 如果 1 秒后地图还没渲染，强制调用
      setTimeout(() => {
        console.log('=== CHECKING MAP RENDER STATUS ===')
        const mapContainer = document.querySelector('.world-map-container')
        if (mapContainer && !document.querySelector('.world-map-svg path')) {
          console.log('=== MAP NOT RENDERED, FORCING RENDER ===')
          // 调用渲染函数
          if (window.renderRealWorldMap) {
            window.renderRealWorldMap()
          } else if (window.dv) {
            window.dv()
          }
        }
      }, 1000)
    </script>
  </body>
</html>
